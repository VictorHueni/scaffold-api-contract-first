name: API Contract CI

# Runs every contract gate on every PR that touches the spec or its
# test/rules harness: Spectral lint (OAS + OWASP + custom), Scalar validate,
# oasdiff breaking-change detection, Schemathesis contract tests, Hurl
# functional tests, and an OWASP ZAP dynamic security scan. Generates
# TypeScript types, bundled spec, and docs HTML as downloadable artifacts.
#
# Works out-of-the-box when this scaffold is used as the project root —
# GitHub Actions reads .github/workflows/*.yml from the repo root, and
# every path below is relative to that root (no sub-directory prefixes).

on:
  push:
    branches: [main]
    paths:
      - "specs/**"
      - "rules/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "specs/**"
      - "rules/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  # ----------------------------------------------------------------
  # 1. Lint & Validate — Scalar validate + Spectral (OAS + OWASP + custom)
  # ----------------------------------------------------------------
  lint:
    name: Lint & Validate Spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate spec (Scalar)
        run: npm run validate

      - name: Bundle spec
        run: npm run bundle

      - name: Spectral lint (OAS + OWASP + custom rules)
        run: npm run lint

  # ----------------------------------------------------------------
  # 2. Breaking Change Detection — oasdiff (PR-only, against base branch)
  # ----------------------------------------------------------------
  breaking-changes:
    name: Breaking Change Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install oasdiff
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://github.com/Tufin/oasdiff/releases/latest/download/oasdiff_linux_amd64 \
            -o "$HOME/.local/bin/oasdiff"
          chmod +x "$HOME/.local/bin/oasdiff"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Extract base branch spec
        run: git show "origin/${{ github.base_ref }}:specs/api.yaml" > /tmp/old-spec.yaml

      - name: Check for breaking changes
        run: oasdiff breaking /tmp/old-spec.yaml specs/api.yaml --fail-on ERR

  # ----------------------------------------------------------------
  # 3. Contract Tests — Schemathesis against Prism mock
  # Auto-generates test cases from the spec (examples + coverage +
  # fuzzing + stateful links). Uses the mock-safe check subset — for
  # a real implementation, switch to `npm run test:contract:full`.
  # ----------------------------------------------------------------
  contract-test:
    name: Contract Tests (Schemathesis)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Schemathesis
        run: pipx install schemathesis

      - name: Bundle spec
        run: npm run bundle

      - name: Start Prism mock server
        run: |
          npx prism mock specs/api.bundled.yaml --port 4010 &
          sleep 3

      - name: Run Schemathesis
        run: |
          schemathesis run specs/api.bundled.yaml \
            --url http://localhost:4010 \
            --checks not_a_server_error,status_code_conformance,content_type_conformance,response_schema_conformance \
            --phases examples,coverage,fuzzing,stateful \
            --max-examples 100 \
            -H "X-API-Key: test-key"

  # ----------------------------------------------------------------
  # 4. Functional Tests — Hurl against Prism mock
  # Hand-written business scenario assertions. Produces JUnit XML.
  # ----------------------------------------------------------------
  functional-test:
    name: Functional Tests (Hurl)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Hurl
        env:
          HURL_VERSION: 5.0.1
        run: |
          curl -sSLO "https://github.com/Orange-OpenSource/hurl/releases/download/${HURL_VERSION}/hurl_${HURL_VERSION}_amd64.deb"
          sudo dpkg -i "hurl_${HURL_VERSION}_amd64.deb"

      - name: Bundle spec
        run: npm run bundle

      - name: Start Prism mock server
        run: |
          npx prism mock specs/api.bundled.yaml --port 4010 &
          sleep 3

      - name: Run Hurl tests (JUnit report)
        run: |
          hurl --test \
            --report-junit hurl-results.xml \
            --variable base_url=http://localhost:4010 \
            $(find tests -name "*.hurl" -type f)

      - name: Upload Hurl JUnit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hurl-junit-report
          path: hurl-results.xml

  # ----------------------------------------------------------------
  # 5. Security Scan — OWASP ZAP API scan against Prism mock
  # Dynamic security probing that complements Spectral's static OWASP
  # ruleset. Non-blocking: reports findings without failing the pipeline.
  # May need per-project tuning (auth headers, server URL overrides).
  # ----------------------------------------------------------------
  security-scan:
    name: Security Scan (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Bundle spec
        run: npm run bundle

      - name: Start Prism mock server
        run: |
          npx prism mock specs/api.bundled.yaml --port 4010 &
          sleep 3

      - name: ZAP API scan
        uses: zaproxy/action-api-scan@v0.7.0
        with:
          target: specs/api.bundled.yaml
          format: openapi
          fail_action: false
          allow_issue_writing: false
          cmd_options: "-O http://localhost:4010"

  # ----------------------------------------------------------------
  # 6. Generate Artifacts — TypeScript types, bundled spec, docs HTML
  # Downloadable artifacts for consumers (frontend teams, doc portals).
  # ----------------------------------------------------------------
  generate-artifacts:
    name: Generate Artifacts
    runs-on: ubuntu-latest
    needs: [lint, contract-test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Bundle spec
        run: npm run bundle

      - name: Generate TypeScript types
        run: npm run types

      - name: Upload TypeScript types
        uses: actions/upload-artifact@v4
        with:
          name: typescript-types
          path: generated/api-types.d.ts

      - name: Upload bundled OpenAPI spec
        uses: actions/upload-artifact@v4
        with:
          name: openapi-bundled
          path: specs/api.bundled.yaml

      - name: Upload Scalar docs HTML
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: docs/index.html
