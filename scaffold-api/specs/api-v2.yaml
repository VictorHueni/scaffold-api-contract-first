# Order Management API v2 — Breaking Change Detection Demo
#
# This file is a standalone copy of the Order Management API spec with
# intentional changes introduced to demonstrate oasdiff breaking-change
# detection.
#
# Breaking changes (3):
#   1. customer.name  → customer.fullName   (field renamed)
#   2. notes field removed from Order        (field removed)
#   3. quantity type: integer → number       (type changed)
#
# Non-breaking changes (1):
#   1. New optional "priority" field on Order (field added)
#
# Usage:
#   oasdiff breaking specs/api.yaml specs/api-v2.yaml
#   oasdiff breaking specs/api.yaml specs/api-v2.yaml --fail-on ERR

openapi: 3.1.0
info:
  title: Order Management API
  version: 2.0.0
  description: >
    Version 2 of the Order Management API with intentional breaking changes
    for oasdiff detection demo. Do not use in production.
  contact:
    name: API Platform Team
    email: api-platform@example.com
  license:
    name: MIT
    identifier: MIT

servers:
  - url: https://dev.api.example.com/v1
    description: Development
  - url: https://staging.api.example.com/v1
    description: Staging
  - url: https://api.example.com/v1
    description: Production

security:
  - apiKey: []
  - oauth2: []

tags:
  - name: Orders
    description: Operations for managing customer orders.
  - name: Order Items
    description: Operations for viewing items within an order.

paths:
  /orders:
    get:
      operationId: listOrders
      summary: List all orders
      description: Retrieve a paginated list of orders, optionally filtered by status.
      tags:
        - Orders
      parameters:
        - name: page
          in: query
          description: Page number for paginated results (1-based).
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
            example: 1
        - name: limit
          in: query
          description: Maximum number of items to return per page.
          required: false
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 20
            example: 20
        - name: status
          in: query
          description: Filter orders by status.
          required: false
          schema:
            type: string
            enum:
              - pending
              - confirmed
              - shipped
              - delivered
              - cancelled
            example: pending
      responses:
        "200":
          description: A paginated list of orders.
          content:
            application/json:
              schema:
                type: object
                description: Paginated response wrapper for a list of orders.
                required:
                  - data
                  - pagination
                properties:
                  data:
                    type: array
                    description: List of orders for the current page.
                    maxItems: 100
                    items:
                      $ref: "#/components/schemas/Order"
                  pagination:
                    type: object
                    description: Pagination metadata.
                    required:
                      - page
                      - limit
                      - totalItems
                      - totalPages
                    properties:
                      page:
                        type: integer
                        format: int32
                        description: Current page number.
                        example: 1
                      limit:
                        type: integer
                        format: int32
                        description: Items per page.
                        example: 20
                      totalItems:
                        type: integer
                        format: int32
                        description: Total number of items across all pages.
                        example: 47
                      totalPages:
                        type: integer
                        format: int32
                        description: Total number of pages.
                        example: 3
                    additionalProperties: false
                additionalProperties: false
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              description: Number of seconds to wait before retrying.
              schema:
                type: integer
                format: int32
                example: 60
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: createOrder
      summary: Create a new order
      description: Submit a new order. The server assigns an ID, calculates totals, and sets the initial status to pending.
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Order"
      responses:
        "201":
          description: Order created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
          links:
            GetCreatedOrder:
              operationId: getOrder
              parameters:
                orderId: $response.body#/id
              description: Retrieve the newly created order by its ID.
            UpdateCreatedOrder:
              operationId: updateOrder
              parameters:
                orderId: $response.body#/id
              description: Update the newly created order.
            DeleteCreatedOrder:
              operationId: deleteOrder
              parameters:
                orderId: $response.body#/id
              description: Delete the newly created order.
        "400":
          description: Validation error in the request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              description: Number of seconds to wait before retrying.
              schema:
                type: integer
                format: int32
                example: 60
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{orderId}:
    parameters:
      - name: orderId
        in: path
        required: true
        description: Unique identifier of the order.
        schema:
          type: string
          format: uuid
          maxLength: 36
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890

    get:
      operationId: getOrder
      summary: Get an order by ID
      description: Retrieve the full details of a single order including all line items.
      tags:
        - Orders
      responses:
        "200":
          description: The requested order.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Order not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              description: Number of seconds to wait before retrying.
              schema:
                type: integer
                format: int32
                example: 60
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      operationId: updateOrder
      summary: Update an order
      description: Update an existing order. Commonly used to change status, add tracking information, or modify notes.
      tags:
        - Orders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Order"
      responses:
        "200":
          description: Order updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Validation error in the request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Order not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              description: Number of seconds to wait before retrying.
              schema:
                type: integer
                format: int32
                example: 60
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteOrder
      summary: Delete an order
      description: Delete an order by ID. Only orders in pending status can be deleted.
      tags:
        - Orders
      responses:
        "204":
          description: Order deleted successfully. No content returned.
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Order not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              description: Number of seconds to wait before retrying.
              schema:
                type: integer
                format: int32
                example: 60
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /orders/{orderId}/items:
    parameters:
      - name: orderId
        in: path
        required: true
        description: Unique identifier of the order.
        schema:
          type: string
          format: uuid
          maxLength: 36
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890

    get:
      operationId: listOrderItems
      summary: List items in an order
      description: Retrieve all line items for a specific order.
      tags:
        - Order Items
      responses:
        "200":
          description: List of order items.
          content:
            application/json:
              schema:
                type: array
                description: All line items in the order.
                maxItems: 100
                items:
                  $ref: "#/components/schemas/OrderItem"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Order not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit exceeded.
          headers:
            Retry-After:
              description: Number of seconds to wait before retrying.
              schema:
                type: integer
                format: int32
                example: 60
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    apiKey:
      type: apiKey
      name: X-API-Key
      in: header
      description: API key passed in the X-API-Key header.
    oauth2:
      type: oauth2
      description: OAuth 2.0 client credentials flow for service-to-service authentication.
      flows:
        clientCredentials:
          tokenUrl: https://auth.example.com/oauth/token
          scopes:
            orders:read: Read access to orders
            orders:write: Create, update, and delete orders

  schemas:
    # -------------------------------------------------------------------------
    # Customer — BREAKING: "name" renamed to "fullName"
    # -------------------------------------------------------------------------
    Customer:
      type: object
      description: Customer information associated with an order.
      required:
        - fullName          # BREAKING: was "name"
        - email
      properties:
        fullName:           # BREAKING: renamed from "name"
          type: string
          description: Full name of the customer.
          minLength: 1
          maxLength: 200
          example: Jane Doe
        email:
          type: string
          format: email
          description: Customer email address.
          maxLength: 254
          example: jane.doe@example.com
        phone:
          type: string
          description: Customer phone number in E.164 format.
          pattern: "^\\+[1-9]\\d{1,14}$"
          maxLength: 16
          example: "+15551234567"
        shippingAddress:
          type: object
          description: Customer shipping address.
          required:
            - street
            - city
            - state
            - postalCode
            - country
          properties:
            street:
              type: string
              description: Street address including unit or apartment number.
              minLength: 1
              maxLength: 300
              example: 742 Evergreen Terrace
            city:
              type: string
              description: City name.
              minLength: 1
              maxLength: 100
              example: Springfield
            state:
              type: string
              description: State or province code.
              minLength: 2
              maxLength: 50
              example: IL
            postalCode:
              type: string
              description: Postal or ZIP code.
              pattern: "^[A-Za-z0-9 -]{3,10}$"
              maxLength: 10
              example: "62704"
            country:
              type: string
              description: ISO 3166-1 alpha-2 country code.
              pattern: "^[A-Z]{2}$"
              minLength: 2
              maxLength: 2
              example: US
          additionalProperties: false
      additionalProperties: false

    # -------------------------------------------------------------------------
    # OrderItem — BREAKING: "quantity" type changed from integer to number
    # -------------------------------------------------------------------------
    OrderItem:
      type: object
      description: A single line item within an order.
      required:
        - productId
        - productName
        - quantity
        - unitPrice
      properties:
        productId:
          type: string
          format: uuid
          description: Unique identifier for the product.
          maxLength: 36
          example: 8f14e45f-ceea-467f-a020-9e2f5a5c5e01
        productName:
          type: string
          description: Display name of the product.
          minLength: 1
          maxLength: 200
          example: Wireless Bluetooth Headphones
        quantity:
          type: number          # BREAKING: was "integer"
          format: double        # BREAKING: was "int32"
          description: Number of units ordered.
          minimum: 1
          maximum: 9999
          example: 2
        unitPrice:
          type: number
          format: double
          description: Price per unit in the order currency.
          minimum: 0.01
          maximum: 999999.99
          example: 49.99
        subtotal:
          type: number
          format: double
          description: Line item subtotal (quantity x unitPrice). Read-only, calculated by the server.
          readOnly: true
          minimum: 0.01
          example: 99.98
      additionalProperties: false

    # -------------------------------------------------------------------------
    # Order — BREAKING: "notes" field removed
    #       — NON-BREAKING: new optional "priority" field added
    # -------------------------------------------------------------------------
    Order:
      type: object
      description: Represents a customer order with items, status tracking, and totals.
      required:
        - id
        - customer
        - items
        - status
        - total
        - createdAt
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the order.
          readOnly: true
          maxLength: 36
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        customer:
          $ref: "#/components/schemas/Customer"
        items:
          type: array
          description: Line items included in the order.
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/OrderItem"
        status:
          type: string
          description: Current status of the order.
          readOnly: true
          enum:
            - pending
            - confirmed
            - shipped
            - delivered
            - cancelled
          example: pending
        total:
          type: number
          format: double
          description: Total order amount in the order currency. Read-only, calculated by the server.
          readOnly: true
          minimum: 0.01
          maximum: 9999999.99
          example: 149.97
        currency:
          type: string
          description: ISO 4217 currency code for the order.
          pattern: "^[A-Z]{3}$"
          minLength: 3
          maxLength: 3
          default: USD
          example: USD
        # BREAKING: "notes" field has been REMOVED (was optional string)
        trackingNumber:
          type: string
          description: Shipping tracking number. Set when order is shipped.
          maxLength: 100
          example: 1Z999AA10123456784
        priority:           # NON-BREAKING: new optional field added
          type: string
          description: Order priority level. Defaults to normal if not specified.
          enum:
            - low
            - normal
            - high
            - urgent
          default: normal
          example: normal
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the order was created.
          readOnly: true
          maxLength: 30
          example: "2026-03-15T10:30:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the order was last updated.
          readOnly: true
          maxLength: 30
          example: "2026-03-16T14:22:00Z"
      additionalProperties: false

    # -------------------------------------------------------------------------
    # ErrorResponse — unchanged from v1
    # -------------------------------------------------------------------------
    ErrorResponse:
      type: object
      description: Standard error response following RFC 7807 Problem Details structure.
      required:
        - status
        - title
        - detail
      properties:
        status:
          type: integer
          format: int32
          description: HTTP status code.
          minimum: 400
          maximum: 599
          example: 400
        title:
          type: string
          description: Short, human-readable summary of the problem type.
          minLength: 1
          maxLength: 200
          example: Validation Error
        detail:
          type: string
          description: Human-readable explanation specific to this occurrence of the problem.
          minLength: 1
          maxLength: 1000
          example: "The 'email' field is required and must be a valid email address."
        type:
          type: string
          format: uri
          description: URI reference identifying the problem type.
          maxLength: 500
          example: "https://api.example.com/errors/validation-error"
        instance:
          type: string
          format: uri
          description: URI reference identifying the specific occurrence of the problem.
          maxLength: 500
          example: "https://api.example.com/errors/12345"
        errors:
          type: array
          description: List of individual validation errors, if applicable.
          maxItems: 50
          items:
            type: object
            description: A single field-level validation error.
            properties:
              field:
                type: string
                description: The field that caused the error.
                maxLength: 200
                example: customer.email
              message:
                type: string
                description: Description of the validation error for this field.
                maxLength: 500
                example: must be a valid email address
            additionalProperties: false
      additionalProperties: false
