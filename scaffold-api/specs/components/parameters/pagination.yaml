page:
  name: page
  in: query
  description: Page number for paginated results (1-based).
  required: false
  schema:
    type: integer
    format: int32
    minimum: 1
    default: 1
    example: 1
  example: 1

limit:
  name: limit
  in: query
  description: Maximum number of items to return per page.
  required: false
  schema:
    type: integer
    format: int32
    minimum: 1
    maximum: 100
    default: 20
    example: 20
  example: 20

status:
  name: status
  in: query
  description: Filter orders by status.
  required: false
  schema:
    type: string
    enum:
      - pending
      - confirmed
      - shipped
      - delivered
      - cancelled
    example: "pending"
  example: "pending"
