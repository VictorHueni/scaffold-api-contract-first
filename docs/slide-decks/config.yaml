# ─────────────────────────────────────────────
# Slide Builder - Project Configuration
# ─────────────────────────────────────────────

title: "API-First: One Contract, Everything Generated"
author: "Victor Hueni"
date_label: "April 2026"

canvas:
  width: 960
  height: 540

fonts:
  - family: "Syne"
    weights: [700, 800]
  - family: "Space Grotesk"
    weights: [400, 500, 600]
  - family: "DM Mono"
    weights: [400, 500]

external_scripts:
  - "https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"

slides:
  - file: "00-title.html"
    class: "s1"
    label: "Title"
  - file: "01-disclaimer.html"
    class: "s-disc"
    label: "Disclaimer"
  - file: "02-wall-of-pain.html"
    class: "s2"
    label: "Wall of Pain"
  - file: "03-code-vs-contract.html"
    class: "s-compare"
    label: "Code vs Contract"
  - file: "04-the-shift.html"
    class: "s4"
    label: "The Shift"
  - file: "05-demo-agenda.html"
    class: "s5"
    label: "Demo Agenda"
  - file: "07a-three-tier-arch.html"
    class: "s-micro"
    label: "Three-Tier Architecture"
  - file: "07-ibm-architecture.html"
    class: "s6"
    label: "ESB Architecture"
  - file: "07-microservice-arch.html"
    class: "s-micro"
    label: "Microservice Architecture"
  - file: "09-maturity-model.html"
    class: "s8"
    label: "Maturity Model"
  - file: "10-role-impact.html"
    class: "s9"
    label: "Role Impact"
  - file: "10b-vision.html"
    class: "s-vision"
    label: "The Vision"
  - file: "11-next-steps.html"
    class: "s10"
    label: "Next Steps"
  - file: "12-closing.html"
    class: "s-closing"
    label: "Closing"

# Paths relative to this config file
paths:
  slides_dir: "output/slides"
  styles_file: "design/styles.css"
  script_file: "design/script.js"
  output_dir: "output/slide-deck"
  output_filename: "presentation.html"

numbering:
  enabled: true
  format: "{current} / {total}"
